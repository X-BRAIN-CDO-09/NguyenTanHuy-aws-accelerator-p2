<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>K8s on AWS - Terraform 1-Click</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">AWS ALB -> EC2 NodePort -> Minikube</p>
        <h1>Kubernetes app delivered by Terraform</h1>
        <p class="lead">
          This static site is served by an nginx Pod inside minikube on EC2,
          then exposed to the Internet through a real AWS Application Load Balancer.
        </p>
        <div class="status-grid">
          <div>
            <span>Runtime</span>
            <strong>Kubernetes</strong>
          </div>
          <div>
            <span>Provider</span>
            <strong>aws + tls</strong>
          </div>
          <div>
            <span>Entry</span>
            <strong>ALB port 80</strong>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
