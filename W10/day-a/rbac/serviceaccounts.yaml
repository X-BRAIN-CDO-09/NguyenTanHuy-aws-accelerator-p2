apiVersion: v1
kind: ServiceAccount
metadata:
  name: developer
  namespace: apps-dev
  labels:
    # Đại diện cho pipeline hoặc user developer khi deploy workload dev.
    role: developer
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre
  namespace: apps-prod
  labels:
    # Đại diện cho nhóm vận hành có quyền xử lý sự cố production.
    role: sre
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: viewer
  namespace: apps-prod
  labels:
    # Đại diện cho auditor hoặc stakeholder chỉ cần quyền đọc.
    role: viewer

