apiVersion: apps/v1
kind: Deployment
metadata:
  name: day-b-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: day-b-nginx
  template:
    metadata:
      labels:
        app: day-b-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80