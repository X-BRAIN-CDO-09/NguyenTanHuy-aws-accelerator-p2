apiVersion: apps/v1
kind: Deployment
metadata:
  name: w9-demo-app
  namespace: w9-demo
  labels:
    app: w9-demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: w9-demo-app
  template:
    metadata:
      labels:
        app: w9-demo-app
    spec:
      containers:
        - name: w9-demo-app
          image: ghcr.io/YOUR_GITHUB_USERNAME/w9-demo-app:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 20
