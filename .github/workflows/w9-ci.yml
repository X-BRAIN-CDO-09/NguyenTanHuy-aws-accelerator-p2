name: W9 CI

on:
  push:
    paths:
      - "W9/**"
      - ".github/workflows/w9-ci.yml"
  pull_request:
    paths:
      - "W9/**"
      - ".github/workflows/w9-ci.yml"
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r W9/app/requirements.txt

      - name: Check Python syntax
        run: |
          python -m compileall W9/app

      - name: Build Docker image
        run: |
          docker build -t w9-demo-app:test W9/app
