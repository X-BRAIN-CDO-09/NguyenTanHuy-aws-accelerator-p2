apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: w9-root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/YOUR_REPO.git
    targetRevision: HEAD
    path: cloud/w9/day-a/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
