apiVersion: apps/v1
kind: Deployment
metadata:
  name: day-c-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: day-c-nginx
  template:
    metadata:
      labels:
        app: day-c-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20