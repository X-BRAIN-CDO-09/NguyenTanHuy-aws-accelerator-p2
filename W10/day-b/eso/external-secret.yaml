apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-api-db
  namespace: apps-prod
spec:
  # ESO kiểm tra backend mỗi 15 phút để đồng bộ secret mới.
  refreshInterval: 15m
  secretStoreRef:
    # Trỏ tới SecretStore dùng AWS Secrets Manager.
    name: aws-secrets-manager
    kind: SecretStore
  target:
    # Kubernetes Secret được tạo trong namespace apps-prod.
    name: platform-api-db
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: platform-api
          app.kubernetes.io/owner: platform-team
  data:
    - secretKey: username
      remoteRef:
        # Secret name trong AWS Secrets Manager.
        key: prod/platform-api/database
        property: username
    - secretKey: password
      remoteRef:
        key: prod/platform-api/database
        property: password

