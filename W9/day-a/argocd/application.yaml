apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: w9-demo-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/YOUR_REPO.git
    targetRevision: HEAD
    path: cloud/w9/day-a/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: w9-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
